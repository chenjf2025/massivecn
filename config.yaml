# ============================================================
# 国内股票行情多源聚合网关配置文件
# ============================================================

# -------------------- 系统级配置 --------------------
system:
  # API 服务配置
  api:
    host: "0.0.0.0"
    port: 8000
    reload: true
    log_level: "info"
  
  # 异步任务配置
  async_task:
    enabled: true
    batch_size: 100          # 批量写入数量
    flush_interval: 5        # 刷新间隔(秒)
    max_queue_size: 10000    # 最大队列大小

# -------------------- 数据源配置 --------------------
sources:
  # 主数据源 (优先调用)
  primary:
    - name: eastmoney
      enabled: true
      priority: 1
      base_url: "https://push2.eastmoney.com"
      timeout: 3.0
      retry: 2
      parser: eastmoney_parser
      
    - name: xueqiu
      enabled: false
      priority: 2
      base_url: "https://stock.xueqiu.com"
      timeout: 3.0
      retry: 2
      parser: xueqiu_parser

  # 备用数据源 (主源失败时降级)
  backup:
    - name: tencent
      enabled: true
      priority: 1
      base_url: "https://qt.gtimg.cn"
      timeout: 2.0
      retry: 1
      parser: tencent_parser
      
    - name: sina
      enabled: true
      priority: 2
      base_url: "https://hq.sinajs.cn"
      timeout: 2.0
      retry: 1
      parser: sina_parser

# -------------------- 数据源路由策略 --------------------
routing:
  # 降级策略: primary -> backup (按优先级)
  failover: true
  
  # 请求超时时间 (秒)
  request_timeout: 5.0
  
  # 重试次数
  max_retries: 2
  
  # 降级延迟 (毫秒)
  failover_delay: 100

# -------------------- TDengine 数据库配置 --------------------
tdengine:
  host: "tdengine"
  port: 6030
  user: "root"
  password: "taosdata"
  database: "market_data"
  pool_size: 5              # 连接池大小
  timeout: 30               # 连接超时(秒)

# -------------------- 前端配置 --------------------
frontend:
  # API 基础路径
  api_base: "http://localhost:8000"
  
  # WebSocket 配置 (如需要实时推送)
  ws_enabled: false
  ws_path: "/ws/quote"

# -------------------- 监控配置 --------------------
monitoring:
  # 健康检查
  health_check:
    enabled: true
    interval: 60             # 间隔(秒)
    
  # 指标收集
  metrics:
    enabled: true
    export_interval: 60
